<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>[Your Name] — Portfolio</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a0f; }
    #app { position: relative; width: 100vw; height: 100vh; }
    canvas { display: block; }
    #overlay {
      position: absolute; inset: 0;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      background: rgba(10, 10, 15, 0.75);
      color: #e8e8f0;
      font-family: 'Space Mono', 'Courier New', monospace;
      text-align: center; cursor: pointer; z-index: 10;
      transition: opacity 0.4s ease;
    }
    #overlay h1 {
      font-size: 1.8rem; letter-spacing: 0.15em; color: #00f0ff;
      text-shadow: 0 0 12px rgba(0, 240, 255, 0.6); margin-bottom: 1rem;
    }
    #overlay p { font-size: 0.9rem; color: #b8b8c8; max-width: 320px; line-height: 1.6; }
    #overlay .key {
      display: inline-block; border: 1px solid #ff2ec4; color: #ff2ec4;
      padding: 2px 8px; border-radius: 3px; margin: 0 2px; font-size: 0.8rem;
    }
    #overlay.hidden { opacity: 0; pointer-events: none; }
    #hud {
      position: absolute; bottom: 20px; left: 20px;
      font-family: 'Space Mono', monospace; font-size: 0.7rem;
      color: #00f0ff88; letter-spacing: 0.1em; z-index: 5; pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="overlay">
      <h1>[YOUR NAME]</h1>
      <p>
        Click to enter<br /><br />
        <span class="key">W</span><span class="key">A</span><span class="key">S</span><span class="key">D</span> to move
        &nbsp;·&nbsp; mouse to look &nbsp;·&nbsp; <span class="key">ESC</span> to exit
      </p>
    </div>
    <div id="hud">SECTOR 00 — VOID</div>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
